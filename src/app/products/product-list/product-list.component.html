<div class="container mt-4">
    <div class="row">
        <!-- Itera sobre los productos -->
        <div class="col-md-4 border-0" *ngFor="let product of products">
            <div class="card h-100">
                <button class=" border-0" [routerLink]="['/product', product.id_product]">
                    <img [src]="product.image" class="card-img-top" alt="{{ product.title }}">
                </button>
                <div class="card-body">
                    <h5 class="card-title">{{ product.title }}</h5>
                </div>
                <div class="card-footer text-center">
                    <p class="mb-2 text-muted"><strong>Precio:</strong> {{ product.price }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
